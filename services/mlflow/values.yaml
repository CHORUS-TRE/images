mlflow:
  postgresql:
    enabled: false
  mysql:
    enabled: false
  backendStore:
    databaseMigration: true
    databaseConnectionCheck: true
    postgres:
      enabled: true
      host: "mlflow-db"
      port: 5432
      database: mlflow
      user: mlflow
      # password: injected per-workspace by operator credential mechanism
  artifactRoot:
    proxiedArtifactStorage: true
  persistence:
    enabled: true
    size: 10Gi

postgres:
  fullnameOverride: "mlflow-db"
  settings:
    superuser:
      value: postgres
    # superuserPassword: existingSecret + secretKey set per-workspace in spec.services.mlflow.values
    userDatabase:
      name:
        value: mlflow
      user:
        value: mlflow
      # password.existingSecret + password.secretKey: set per-workspace in spec.services.mlflow.values
  storage:
    requestedSize: 5Gi
