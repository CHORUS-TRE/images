mlflow:
  postgresql:
    enabled: false
  mysql:
    enabled: false
  backendStore:
    databaseMigration: true
    databaseConnectionCheck: true
    postgres:
      enabled: true
      port: 5432
      database: mlflow
      user: mlflow
  artifactRoot:
    proxiedArtifactStorage: true
  log:
    enabled: false
  extraArgs:
    host: "0.0.0.0"
    allowedHosts: "*"
    uvicornOpts: "--log-level info"
  extraVolumes:
    - name: artifacts
      persistentVolumeClaim:
        claimName: mlflow-artifacts
  extraVolumeMounts:
    - name: artifacts
      mountPath: /mlflow/mlartifacts

artifactStorage:
  size: 10Gi

postgres:
  # Service name = "<release>-<nameOverride>". This suffix is referenced
  # verbatim by `mlflow.backendStore.postgres.host` in chorus.yaml; if you
  # change it here, update chorus.yaml too or mlflow won't reach the DB.
  nameOverride: "mlflow-db"
  settings:
    superuser:
      value: postgres
  userDatabase:
    name:
      value: mlflow
    user:
      value: mlflow
  storage:
    requestedSize: 5Gi

networkPolicy:
  enabled: true
  enabledL7Waf: false
